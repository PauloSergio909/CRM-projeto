version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clientebox-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clientebox
      POSTGRES_PASSWORD: clientebox123
      POSTGRES_DB: clientebox_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientebox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
